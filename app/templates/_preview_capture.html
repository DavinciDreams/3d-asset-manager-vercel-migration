<!-- Reusable client-side preview-video capture. Records a canvas to a short
     looping WebM via MediaRecorder and uploads it to /api/model/<id>/preview.
     Exposes window.capturePreview(canvas, modelId, opts) -> Promise<bool>. -->
<script>
(function () {
    // Pick a WebM codec the browser actually supports.
    function pickMimeType() {
        const candidates = [
            'video/webm;codecs=vp9',
            'video/webm;codecs=vp8',
            'video/webm'
        ];
        for (const m of candidates) {
            if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m;
        }
        return null;
    }

    // Record `canvas` for durationMs and POST the resulting WebM.
    // opts: { durationMs=4000, fps=30, onProgress }
    window.capturePreview = function (canvas, modelId, opts = {}) {
        return new Promise((resolve) => {
            // Idempotent settle: this Promise must ALWAYS resolve exactly once.
            // A black-screened canvas or a hung upload must never leave the
            // caller awaiting forever.
            let settled = false;
            let hardTimer = null;
            const done = (v) => {
                if (settled) return;
                settled = true;
                if (hardTimer) { clearTimeout(hardTimer); hardTimer = null; }
                resolve(v);
            };

            if (!canvas || typeof canvas.captureStream !== 'function' || !window.MediaRecorder) {
                console.warn('Preview capture not supported in this browser.');
                done(false);
                return;
            }
            const mimeType = pickMimeType();
            if (!mimeType) { done(false); return; }

            const durationMs = opts.durationMs || 4000;
            const fps = opts.fps || 30;
            const hardTimeoutMs = opts.hardTimeoutMs || 8000;
            const uploadTimeoutMs = opts.uploadTimeoutMs || 15000;
            let stream, recorder;
            try {
                stream = canvas.captureStream(fps);
                recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 2_500_000 });
            } catch (e) {
                console.warn('MediaRecorder init failed:', e);
                done(false);
                return;
            }

            const chunks = [];
            recorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
            recorder.onstop = async () => {
                try {
                    const blob = new Blob(chunks, { type: mimeType });
                    if (!blob.size) { done(false); return; }
                    // Abort a hung upload so we still settle within budget.
                    const ac = new AbortController();
                    const upTimer = setTimeout(() => ac.abort(), uploadTimeoutMs);
                    try {
                        const resp = await fetch('/api/model/' + modelId + '/preview', {
                            method: 'POST',
                            headers: { 'Content-Type': mimeType },
                            body: blob,
                            signal: ac.signal
                        });
                        const data = await resp.json().catch(() => ({}));
                        done(data.success === true);
                    } finally {
                        clearTimeout(upTimer);
                    }
                } catch (err) {
                    console.warn('Preview upload failed:', err);
                    done(false);
                }
            };

            try {
                recorder.start();
                // Stop recording after durationMs...
                setTimeout(() => { if (recorder.state !== 'inactive') recorder.stop(); }, durationMs);
                // ...and a master timeout in case onstop/upload never fires.
                hardTimer = setTimeout(() => {
                    try { if (recorder.state !== 'inactive') recorder.stop(); } catch (e) {}
                    done(false);
                }, durationMs + hardTimeoutMs);
            } catch (e) {
                console.warn('Recording failed:', e);
                done(false);
            }
        });
    };
})();
</script>
