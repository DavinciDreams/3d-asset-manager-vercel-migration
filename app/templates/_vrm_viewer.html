<!-- Self-contained VRM/VRMA viewer using three.js + @pixiv/three-vrm.
     Exposes window.VRMViewer.init(containerId, vrmUrl, options) which returns
     a controller with applyAnimation(vrmaUrl), resetPose(), capturePng(), dispose().
     The @pixiv/three-vrm[-animation] specifiers resolve via the single importmap
     in base_3d.html (a document may only have one importmap). -->
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { KTX2Loader } from 'three/addons/loaders/KTX2Loader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
import { VRMAnimationLoaderPlugin, createVRMAnimationClip } from '@pixiv/three-vrm-animation';

const DRACO_PATH = 'https://www.gstatic.com/draco/versioned/decoders/1.5.7/';
const BASIS_PATH = 'https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/libs/basis/';

async function makeLoader(renderer) {
    const loader = new GLTFLoader();
    const dracoLoader = new DRACOLoader().setDecoderPath(DRACO_PATH);
    const ktx2Loader = new KTX2Loader().setTranscoderPath(BASIS_PATH);
    ktx2Loader.detectSupport(renderer);
    loader.setDRACOLoader(dracoLoader);
    loader.setKTX2Loader(ktx2Loader);
    loader.setMeshoptDecoder(MeshoptDecoder);
    loader.register((parser) => new VRMLoaderPlugin(parser));
    loader.register((parser) => new VRMAnimationLoaderPlugin(parser));
    if (MeshoptDecoder.ready) await MeshoptDecoder.ready;
    return { loader, dracoLoader, ktx2Loader };
}

async function init(containerId, vrmUrl, options = {}) {
    const container = document.getElementById(containerId);
    if (!container) { console.error('VRM container not found:', containerId); return null; }
    container.innerHTML = '';

    const width = container.clientWidth || 400;
    const height = container.clientHeight || 400;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, width / height, 0.1, 100);
    camera.position.set(0, 1.3, 3);

    // preserveDrawingBuffer lets us capture the canvas to a PNG thumbnail. Use
    // an opaque white background so transparent costume textures preview like
    // the GLB/game viewer instead of compositing dark fringes over the page.
    const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: false,
        premultipliedAlpha: false,
        preserveDrawingBuffer: true
    });
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    // Match the brightness/look of the GLB viewer (neutral tone mapping + IBL).
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.NeutralToneMapping;
    renderer.toneMappingExposure = 1;
    renderer.setClearColor(0xffffff, 1);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.0, 0);
    controls.update();

    // Built-in RoomEnvironment as an IBL source for any PBR parts of the avatar.
    // Keep the visible background plain white to match model-viewer captures.
    const pmrem = new THREE.PMREMGenerator(renderer);
    const envTexture = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
    scene.environment = envTexture;
    scene.background = new THREE.Color(0xffffff);

    scene.add(new THREE.AmbientLight(0xffffff, 1.0));
    const dir = new THREE.DirectionalLight(0xffffff, 1.5);
    dir.position.set(1, 2, 1.5);
    scene.add(dir);

    const { loader, dracoLoader, ktx2Loader } = await makeLoader(renderer);
    const clock = new THREE.Clock();

    let vrm = null;
    let mixer = null;
    let currentAction = null;
    let disposed = false;

    try {
        const gltf = await loader.loadAsync(vrmUrl);
        vrm = gltf.userData.vrm;
        if (!vrm) throw new Error('No VRM data in file');

        // VRM 0.x faces -Z; rotate so it faces the camera (+Z) like VRM 1.0.
        const meta = vrm.meta || {};
        if (meta.metaVersion === '0.0' || meta.specVersion === '0.0') {
            VRMUtils.rotateVRM0(vrm);
        }
        VRMUtils.removeUnnecessaryVertices(vrm.scene);
        VRMUtils.removeUnnecessaryJoints(vrm.scene);
        vrm.scene.traverse((node) => {
            if (!node.isMesh || !node.material) return;
            const materials = Array.isArray(node.material) ? node.material : [node.material];
            materials.filter(Boolean).forEach((material) => {
                material.needsUpdate = true;
                const map = material.map;
                if (map) {
                    map.colorSpace = THREE.SRGBColorSpace;
                    map.needsUpdate = true;
                }
                if (material.transparent && material.opacity >= 0.98 && material.alphaTest < 0.02) {
                    material.alphaTest = 0.02;
                }
            });
        });

        scene.add(vrm.scene);

        // Frame the avatar: aim camera at chest height.
        const box = new THREE.Box3().setFromObject(vrm.scene);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        controls.target.set(center.x, center.y, center.z);
        camera.position.set(center.x, center.y + size.y * 0.1, size.y * 1.6 + 0.5);
        controls.update();

        if (options.onLoad) options.onLoad(vrm);
    } catch (err) {
        console.error('Failed to load VRM:', err);
        container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#dc2626;font-size:0.875rem;text-align:center;padding:1rem;">Failed to load VRM avatar.<br>The file may be invalid or an unsupported VRM version.</div>';
        if (options.onError) options.onError(err);
        return null;
    }

    function animate() {
        if (disposed) return;
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (mixer) mixer.update(delta);
        if (vrm) vrm.update(delta);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        if (disposed) return;
        const w = container.clientWidth || width;
        const h = container.clientHeight || height;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    });

    return {
        get vrm() { return vrm; },
        get canvas() { return renderer.domElement; },
        setAutoRotate(on, speed) {
            controls.autoRotate = !!on;
            if (speed) controls.autoRotateSpeed = speed;
        },
        async applyAnimation(vrmaUrl) {
            if (!vrm) return false;
            try {
                const gltf = await loader.loadAsync(vrmaUrl);
                const vrmAnimation = (gltf.userData.vrmAnimations || [])[0] || gltf.userData.vrmAnimation;
                if (!vrmAnimation) throw new Error('No VRMA data in file');
                const clip = createVRMAnimationClip(vrmAnimation, vrm);
                if (!mixer) mixer = new THREE.AnimationMixer(vrm.scene);
                if (currentAction) currentAction.stop();
                currentAction = mixer.clipAction(clip);
                currentAction.play();
                return true;
            } catch (err) {
                console.error('Failed to apply VRMA:', err);
                return false;
            }
        },
        stopAnimation() {
            if (mixer) mixer.stopAllAction();
            currentAction = null;
        },
        capturePng() {
            try {
                renderer.render(scene, camera);
                return renderer.domElement.toDataURL('image/png');
            } catch (e) { return null; }
        },
        dispose() {
            disposed = true;
            if (mixer) mixer.stopAllAction();
            if (vrm) VRMUtils.deepDispose(vrm.scene);
            scene.environment = null;
            envTexture.dispose();
            pmrem.dispose();
            dracoLoader.dispose();
            ktx2Loader.dispose();
            renderer.dispose();
        }
    };
}

window.VRMViewer = { init };
window.dispatchEvent(new Event('vrmviewer-ready'));
</script>
