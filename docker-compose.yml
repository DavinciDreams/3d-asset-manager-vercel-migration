services:
  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://asset_manager:${POSTGRES_PASSWORD}@postgres:5432/3d_asset_manager
      FLASK_ENV: production
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-100}
      PORT: ${PORT:-8000}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_BUCKET: ${S3_BUCKET:-asset-manager}
      S3_ENDPOINT_URL: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      TELLUS_PERSISTENCE_API_TOKEN: ${TELLUS_PERSISTENCE_API_TOKEN}
      TELLUS_ADMIN_API_TOKEN: ${TELLUS_ADMIN_API_TOKEN}
      TELLUS_ADMIN_USER_ID: ${TELLUS_ADMIN_USER_ID}
      TELLUS_ADMIN_USERNAME: ${TELLUS_ADMIN_USERNAME}
      ASSET_MANAGER_ADMIN_USER_IDS: ${ASSET_MANAGER_ADMIN_USER_IDS}
      ASSET_MANAGER_ADMIN_USERNAMES: ${ASSET_MANAGER_ADMIN_USERNAMES}
      ASSET_MANAGER_ADMIN_EMAILS: ${ASSET_MANAGER_ADMIN_EMAILS}
      ASSET_MANAGER_API_TOKEN: ${ASSET_MANAGER_API_TOKEN}
      API_UPLOAD_USER_ID: ${API_UPLOAD_USER_ID}
      API_UPLOAD_USERNAME: ${API_UPLOAD_USERNAME}
      AI_AUTOTAG_PROVIDER: ${AI_AUTOTAG_PROVIDER:-openai}
      AI_AUTOTAG_API_KEY: ${AI_AUTOTAG_API_KEY}
      AI_AUTOTAG_BASE_URL: ${AI_AUTOTAG_BASE_URL:-https://api.openai.com/v1}
      AI_AUTOTAG_MODEL: ${AI_AUTOTAG_MODEL:-gpt-4.1-mini}
      AI_AUTOTAG_TRANSPORT: ${AI_AUTOTAG_TRANSPORT:-openai}
      AI_AUTOTAG_TIMEOUT: ${AI_AUTOTAG_TIMEOUT:-120}
      AI_AUTOTAG_WORKER: ${AI_AUTOTAG_WORKER:-1}
      AI_AUTOTAG_KICK_ON_REQUEST: ${AI_AUTOTAG_KICK_ON_REQUEST:-1}
      AI_AUTOTAG_STALE_MINUTES: ${AI_AUTOTAG_STALE_MINUTES:-15}
      AI_AUTOTAG_ON_UPLOAD: ${AI_AUTOTAG_ON_UPLOAD:-1}
      AI_AUTOTAG_OVERWRITE_ON_UPLOAD: ${AI_AUTOTAG_OVERWRITE_ON_UPLOAD:-1}
      AI_AUTOTAG_INCLUDE_TITLE: ${AI_AUTOTAG_INCLUDE_TITLE:-1}
      AI_AUTOTAG_INCLUDE_DESCRIPTION: ${AI_AUTOTAG_INCLUDE_DESCRIPTION:-1}
      AI_AUTOTAG_USE_VISION: ${AI_AUTOTAG_USE_VISION:-1}
      AI_AUTOTAG_RETRY_TEXT_ONLY: ${AI_AUTOTAG_RETRY_TEXT_ONLY:-1}
      AI_AUTOTAG_USER_AGENT: ${AI_AUTOTAG_USER_AGENT:-3d-asset-manager/1.0}
      AI_AUTOTAG_ZAI_MCP: ${AI_AUTOTAG_ZAI_MCP:-0}
      AI_AUTOTAG_ZAI_MCP_REQUIRED: ${AI_AUTOTAG_ZAI_MCP_REQUIRED:-0}
      AI_AUTOTAG_MCP_COMMAND: ${AI_AUTOTAG_MCP_COMMAND:-npx -y @z_ai/mcp-server@latest}
      AI_AUTOTAG_MCP_TOOL: ${AI_AUTOTAG_MCP_TOOL:-image_analysis}
      AI_AUTOTAG_MCP_TIMEOUT: ${AI_AUTOTAG_MCP_TIMEOUT:-120}
      Z_AI_MODE: ${Z_AI_MODE:-ZAI}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ZAI_API_KEY: ${ZAI_API_KEY}
      Z_AI_API_KEY: ${Z_AI_API_KEY}
      OPENAI_AUTOTAG_MODEL: ${OPENAI_AUTOTAG_MODEL:-gpt-4.1-mini}
      OPENAI_AUTOTAG_TIMEOUT: ${OPENAI_AUTOTAG_TIMEOUT:-30}
      HYADES_API_KEY: ${HYADES_API_KEY}
      HYADES_VISION_BASE_URL: ${HYADES_VISION_BASE_URL}
      HYADES_VISION_MODEL: ${HYADES_VISION_MODEL}
      HYADES_TRANSPORT: ${HYADES_TRANSPORT}
      ENABLE_CONVERSION: ${ENABLE_CONVERSION:-1}
      PIPELINE_RECONCILER_WORKER: ${PIPELINE_RECONCILER_WORKER:-1}
      PIPELINE_RECONCILE_INTERVAL: ${PIPELINE_RECONCILE_INTERVAL:-120}
      PIPELINE_OPTIMIZE_LIMIT: ${PIPELINE_OPTIMIZE_LIMIT:-3}
      # One candidate per pass; the PostgreSQL advisory claim also prevents
      # duplicate LOD work across Gunicorn worker processes.
      PIPELINE_LOD_LIMIT: ${PIPELINE_LOD_LIMIT:-1}
      SOURCE_PALETTE_MAX_SOURCE_MB: ${SOURCE_PALETTE_MAX_SOURCE_MB:-96}
      SOURCE_PALETTE_CLUSTER_SAMPLES: ${SOURCE_PALETTE_CLUSTER_SAMPLES:-50000}
      SOURCE_PALETTE_SOURCE_SAMPLES: ${SOURCE_PALETTE_SOURCE_SAMPLES:-12000}
      SOURCE_PALETTE_MAX_TARGET_FACES: ${SOURCE_PALETTE_MAX_TARGET_FACES:-60000}
      SOURCE_PALETTE_TRANSFER_CHUNK: ${SOURCE_PALETTE_TRANSFER_CHUNK:-256}
      PIPELINE_ENRICH_LIMIT: ${PIPELINE_ENRICH_LIMIT:-25}
      PIPELINE_CONVERSION_LIMIT: ${PIPELINE_CONVERSION_LIMIT:-20}
      PIPELINE_RENDER_LIMIT: ${PIPELINE_RENDER_LIMIT:-10}
      AUTO_LOD_OPTIMIZE: ${AUTO_LOD_OPTIMIZE:-1}
      AUTO_ENRICH_AFTER_THUMBNAIL: ${AUTO_ENRICH_AFTER_THUMBNAIL:-1}
      SERVER_RENDER_THUMBNAILS: ${SERVER_RENDER_THUMBNAILS:-1}
      CLIENT_MEDIA_CAPTURE_ENABLED: ${CLIENT_MEDIA_CAPTURE_ENABLED:-1}
      AUTO_CAPTURE_THUMBNAILS: ${AUTO_CAPTURE_THUMBNAILS:-1}
      AUTO_CAPTURE_PREVIEW_VIDEOS: ${AUTO_CAPTURE_PREVIEW_VIDEOS:-1}
      FBX2GLTF_BIN: ${FBX2GLTF_BIN:-/usr/local/bin/FBX2glTF}
      ASSIMP_BIN: ${ASSIMP_BIN:-assimp}
      NODE_BIN: ${NODE_BIN:-node}
      FBX2VRMA_DIR: ${FBX2VRMA_DIR:-/app/tools}
    ports:
      - "8088:8000"        # publish container 8000 on host 8088
    restart: unless-stopped

  media-capture:
    build:
      context: .
      dockerfile: Dockerfile.media-capture
    depends_on:
      - app
    environment:
      ASSET_MANAGER_BASE_URL: http://app:8000
      ASSET_CAPTURE_TOKEN: ${ASSET_CAPTURE_TOKEN}
      TELLUS_ADMIN_API_TOKEN: ${TELLUS_ADMIN_API_TOKEN}
      ASSET_MANAGER_API_TOKEN: ${ASSET_MANAGER_API_TOKEN}
      MEDIA_CAPTURE_KIND: ${MEDIA_CAPTURE_KIND:-all}
      MEDIA_CAPTURE_LIMIT: ${MEDIA_CAPTURE_LIMIT:-25}
      MEDIA_CAPTURE_INTERVAL: ${MEDIA_CAPTURE_INTERVAL:-20}
      MEDIA_CAPTURE_TIMEOUT: ${MEDIA_CAPTURE_TIMEOUT:-60}
    command:
      - python
      - scripts/backfill_media_capture.py
      - --base-url
      - http://app:8000
      - --kind
      - ${MEDIA_CAPTURE_KIND:-all}
      - --limit
      - ${MEDIA_CAPTURE_LIMIT:-25}
      - --interval
      - ${MEDIA_CAPTURE_INTERVAL:-20}
      - --capture-timeout
      - ${MEDIA_CAPTURE_TIMEOUT:-60}
      - --poll
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: 3d_asset_manager
      POSTGRES_USER: asset_manager
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asset_manager -d 3d_asset_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - minio_data:/data

  migrate-mongo:
    build: .
    profiles:
      - migration
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://asset_manager:${POSTGRES_PASSWORD}@postgres:5432/3d_asset_manager
      MONGODB_URI: ${MONGODB_URI}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_BUCKET: ${S3_BUCKET:-asset-manager}
      S3_ENDPOINT_URL: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    command: ["python", "scripts/migrate_mongo_to_postgres.py"]

volumes:
  postgres_data:
  minio_data:
